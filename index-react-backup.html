<script id="banzs-open-fallback">
  (function () {
    function pageImages(prefix, count, label) {
      var html = '';
      for (var i = 1; i <= count; i++) {
        var page = String(i).padStart(2, '0');
        html += '<figure class="fallback-page"><figcaption>' + label + ' Page ' + i + '</figcaption><img src="./assets/' + prefix + '/page-' + page + '.png" alt="' + label + ' page ' + i + '" loading="lazy"></figure>';
      }
      return html;
    }
    function showFallback() {
      var root = document.getElementById('root');
      if (!root || root.children.length > 0) return;
      root.innerHTML = '<main class="fallback-site">'
        + '<header class="fallback-header"><div class="fallback-brand"><span>B</span><strong>BANZS TEAM</strong></div><nav><button data-view="home" class="is-active">Home</button><button data-view="flow">ASIC Flow</button><button data-view="modules">Modules</button></nav></header>'
        + '<section class="fallback-view fallback-home" data-panel="home"><p class="eyebrow">Backend Physical Design Workshop</p><h1>BANZS Semiconductor ASIC Flow Workshop</h1><p>A premium academy for ASIC physical design, PnR flow, STA, routing, verification, signoff, and tapeout readiness.</p></section>'
        + '<section class="fallback-view" data-panel="flow" hidden><div class="flow-choice-buttons"><button data-flow="asic">ASIC Flow</button><button data-flow="pnr">PnR Flow</button></div><div class="fallback-flow-output"><p class="eyebrow">Choose ASIC Flow or PnR Flow</p></div></section>'
        + '<section class="fallback-view" data-panel="modules" hidden><p class="eyebrow">Modules</p><h2>ASIC learning modules</h2><p>Open Home or ASIC Flow from the top menu to continue learning.</p></section>'
        + '</main>';
      root.querySelectorAll('nav button').forEach(function (button) {
        button.addEventListener('click', function () {
          root.querySelectorAll('nav button').forEach(function (b) { b.classList.remove('is-active'); });
          button.classList.add('is-active');
          root.querySelectorAll('[data-panel]').forEach(function (panel) { panel.hidden = panel.dataset.panel !== button.dataset.view; });
        });
      });
      root.querySelectorAll('[data-flow]').forEach(function (button) {
        button.addEventListener('click', function () {
          root.querySelectorAll('[data-flow]').forEach(function (b) { b.classList.remove('is-active'); });
          button.classList.add('is-active');
          var out = root.querySelector('.fallback-flow-output');
          if (button.dataset.flow === 'asic') {
            out.innerHTML = '<p class="eyebrow">ASIC Flow Workshop</p><h2>Complete ASIC Flow</h2>' + pageImages('asic-flow-pages', 20, 'ASIC Flow');
          } else {
            out.innerHTML = '<p class="eyebrow">Physical Design / PnR</p><h2>PnR Flow</h2>' + pageImages('pnr-flow-pages', 21, 'PnR Flow');
          }
        });
      });
    }
    setTimeout(showFallback, 1800);
    window.addEventListener('error', function () { setTimeout(showFallback, 100); });
  })();
</script>
