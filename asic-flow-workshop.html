<head>

  <title>BANZS ASIC Flow Workshop Guide</title>
  <style>
    :root{color-scheme:dark;--bg:#090805;--panel:#15130e;--gold:#ffd966;--gold2:#d99a19;--text:#fff6e7;--muted:#c9bea8;--line:rgba(255,217,102,.28);--green:#73e6a8}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% 0,rgba(255,217,102,.16),transparent 28rem),radial-gradient(circle at 90% 10%,rgba(115,230,168,.08),transparent 22rem),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:22px}.shell{max-width:1440px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:18px}.eyebrow{margin:0 0 8px;color:var(--gold);font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:900}h1{margin:0;font-size:clamp(34px,5vw,76px);line-height:.98;letter-spacing:0}.intro{max-width:900px;color:var(--muted);font-size:18px;line-height:1.55;margin:16px 0 0}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;padding-top:6px}.action{border:1px solid var(--line);border-radius:999px;padding:12px 16px;color:var(--gold);text-decoration:none;font-weight:900;background:rgba(115,230,168,.08)}.action.primary{background:linear-gradient(135deg,#ffe784,var(--gold2));color:#090805;border-color:rgba(255,255,255,.7)}.guide-card{border:1px solid var(--line);background:linear-gradient(145deg,rgba(33,30,22,.94),rgba(8,7,4,.96));border-radius:30px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.45)}.flow-bar-wrap{padding:14px;border-bottom:1px solid var(--line);background:rgba(13,11,7,.86);position:sticky;top:0;z-index:5;backdrop-filter:blur(14px)}.flow-bar{display:flex;gap:10px;overflow-x:auto;padding:4px 4px 10px;scroll-snap-type:x proximity;scrollbar-color:var(--gold2) rgba(255,255,255,.08)}.flow-tab{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--muted);border-radius:999px;padding:12px 16px;font-size:14px;font-weight:900;white-space:nowrap;cursor:pointer;scroll-snap-align:start;transition:.16s ease}.flow-tab:hover,.flow-tab:focus-visible{outline:none;color:var(--text);border-color:rgba(255,217,102,.7);transform:translateY(-1px)}.flow-tab.is-active{background:linear-gradient(135deg,#ffe784,var(--gold2));color:#090805;border-color:rgba(255,255,255,.75);box-shadow:0 12px 34px rgba(255,217,102,.22)}.stage-info{padding:clamp(18px,3vw,34px);border-bottom:1px solid var(--line)}.stage-info h2{margin:0 0 12px;font-size:clamp(26px,3vw,44px);letter-spacing:0}.stage-info p{color:var(--muted);font-size:17px;line-height:1.62;margin:0 0 12px}.page-stack{display:grid;gap:24px;padding:clamp(14px,2vw,28px)}.pdf-page{margin:0;padding:clamp(10px,1.4vw,20px);border:1px solid rgba(255,217,102,.22);border-radius:24px;background:rgba(6,5,4,.82);box-shadow:0 18px 54px rgba(0,0,0,.34);scroll-margin-top:112px}.pdf-page figcaption{display:flex;justify-content:space-between;gap:12px;color:var(--gold);font-weight:900;margin-bottom:10px}.pdf-page img{display:block;width:100%;max-width:1180px;height:auto;margin:0 auto;border-radius:14px;background:#fff;box-shadow:0 12px 34px rgba(0,0,0,.28)}.note{margin-top:16px;border-left:4px solid var(--green);padding:12px 14px;background:rgba(115,230,168,.08);color:var(--muted);border-radius:0 14px 14px 0}@media(max-width:820px){body{padding:10px}.top{display:block}.actions{justify-content:flex-start;margin-top:14px}.guide-card{border-radius:22px}.pdf-page{border-radius:16px}.pdf-page figcaption{display:block}.pdf-page img{border-radius:10px}}
  </style>

<style id="all-pdf-pages-clarity-fix">
  .asic-flow-session,
  .modules-pdf-section,
  .modules-pdf-layout,
  .modules-selected-page,
  .asic-flow-pages,
  .pnr-flow-pages,
  .modules-pdf-pages {
    overflow-x: hidden !important;
    max-width: 100% !important;
  }
  .asic-flow-pages,
  .pnr-flow-pages,
  .modules-pdf-pages {
    justify-items: center !important;
    align-items: start !important;
  }
  .asic-flow-page,
  .pnr-flow-page,
  .modules-pdf-page,
  .page,
  .modules-selected-page .modules-pdf-page {
    box-sizing: border-box !important;
    width: min(100%, 1120px) !important;
    max-width: 100% !important;
    margin-left: auto !important;
    margin-right: auto !important;
    overflow: visible !important;
    display: block !important;
    padding: clamp(8px, 1vw, 14px) !important;
  }
  .asic-flow-page img,
  .pnr-flow-page img,
  .modules-pdf-page img,
  .page img,
  .modules-selected-page .modules-pdf-page img {
    box-sizing: border-box !important;
    display: block !important;
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
    height: auto !important;
    object-fit: contain !important;
    object-position: top center !important;
    margin: 0 auto !important;
  }
  .modules-selected-page {
    padding-right: 18px !important;
  }
  @media (min-width: 1500px) {
    .asic-flow-page,
    .pnr-flow-page,

      width: min(100%, 1220px) !important;
    }
  }
  @media (max-width: 900px) {
    .modules-pdf-layout {
      grid-template-columns: 1fr !important;
    }
    .modules-pdf-sidebar {
      max-height: 42vh !important;
    }

      padding-right: 0 !important;
    }
  }
</style>

<body>
  <main class="shell">
    <section class="top">
      <div>
        <p class="eyebrow">BANZS Team · ASIC Flow Workshop</p>
        <h1>Complete ASIC Flow PDF Session</h1>
        <p class="intro">Complete stage-by-stage guide with specifications, real-time diagrams, flow tables, screenshots, and tapout introduction shown in the same dark-cyan PDF theme.</p>
      </div>
      <div class="actions">
        <a class="action" href="./">Back to Website</a>
      </div>
    </section>

    <section class="guide-card">
      <div class="flow-bar-wrap"><nav class="flow-bar" id="flowTabs" aria-label="ASIC flow PDF stages"></nav></div>
      <article class="stage-info" id="stageInfo"></article>
      <div class="page-stack" id="pageStack"></div>
    </section>
  </main>

  <script>
    const stages = [
      { name:'Overview', page:1, title:'Workshop Overview', summary:'Start here for the complete ASIC flow workshop guide.' },
      { name:'Specification', page:2, title:'Specification and Architecture', summary:'Requirements, interfaces, clocks, resets, power intent, and expected functionality.' },
      { name:'RTL Design', page:4, title:'RTL Design', summary:'Synthesizable Verilog/SystemVerilog implementation from the specification.' },
      { name:'Verification', page:5, title:'Functional Verification', summary:'Simulation, assertions, coverage, waveform debug, and test plan closure.' },
      { name:'Synthesis', page:7, title:'Logic Synthesis', summary:'RTL mapped into gates using SDC constraints and standard-cell libraries.' },
      { name:'DFT', page:8, title:'Design For Test', summary:'Scan/test structures added so silicon can be tested after manufacturing.' },
      { name:'Floorplan', page:9, title:'Floorplanning', summary:'Die/core size, macro placement, IO location, halos, channels, and early physical plan.' },
      { name:'Power Plan', page:10, title:'Power Planning', summary:'VDD/VSS rings, straps, rails, vias, domain connections, and power integrity readiness.' },
      { name:'Placement', page:11, title:'Placement', summary:'Standard cell placement optimized for timing, density, congestion, and power.' },
      { name:'CTS', page:12, title:'Clock Tree Synthesis', summary:'Clock network construction for skew, latency, transition, and clock power.' },
      { name:'Routing', page:13, title:'Routing', summary:'Metal routing, antenna, DRC, timing, extraction, and signal integrity preparation.' },
      { name:'STA', page:15, title:'Static Timing Analysis', summary:'Setup/hold timing closure across modes and corners.' },
      { name:'DRC/LVS', page:16, title:'Physical Verification', summary:'Manufacturing rule checks and layout-vs-schematic connectivity checks.' },
      { name:'Signoff', page:18, title:'Signoff Checks', summary:'Final timing, DRC, LVS, IR/EM, SI, low-power, and ECO evidence before tapeout.' },
      { name:'Tapeout', page:20, title:'Tapeout Readiness', summary:'Final GDS and signoff report package for manufacturing handoff.' }
    ];
    const pageTitles = ['Cover / Guide Start','Workshop Introduction','ASIC Flow Map','RTL Design','Verification','Simulation / Waveform','Synthesis','DFT','Floorplanning','Power Planning','Placement','CTS','Routing','Extraction / Timing Prep','STA','DRC/LVS','Physical Signoff','Signoff Closure','Tapeout Checklist','Final Handoff'];
    const tabs = document.getElementById('flowTabs');
    const info = document.getElementById('stageInfo');
    const stack = document.getElementById('pageStack');
    let active = 0;
    function renderPages(){
      stack.innerHTML = Array.from({length:20},(_,i)=>{
        const page = String(i+1).padStart(2,'0');
        return `<figure class="pdf-page" id="page-${i+1}"><figcaption><span>Page ${i+1}</span><span>${pageTitles[i] || 'ASIC Flow Guide'}</span></figcaption><img src="./assets/asic-flow-pages/page-${page}.png" alt="ASIC Flow Workshop Guide page ${i+1}" loading="${i>2?'lazy':'eager'}"></figure>`;
      }).join('');
    }
    function renderTabs(){
      tabs.innerHTML = stages.map((stage,index)=>`<button class="flow-tab ${index===active?'is-active':''}" type="button" data-index="${index}" aria-selected="${index===active}">${index+1}. ${stage.name}</button>`).join('');
    }
    function renderStage(){
      const stage = stages[active];
      info.innerHTML = `<p class="eyebrow">Stage ${active + 1} · Page ${stage.page}</p><h2>${stage.title}</h2><p>${stage.summary}</p><div class="note">The page images below are rendered from the original PDF, so no photo, diagram, or written content is removed.</div>`;
    }
    function setActive(index){
      active = index;
      renderTabs();
      renderStage();
      document.getElementById(`page-${stages[index].page}`)?.scrollIntoView({behavior:'smooth', block:'start'});
      tabs.querySelector(`[data-index="${index}"]`)?.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
    }
    tabs.addEventListener('click', event=>{
      const button = event.target.closest('.flow-tab');
      if (!button) return;
      setActive(Number(button.dataset.index));
    });
    renderPages();
    renderTabs();
    renderStage();
  </script>
<script src="./assets/banzs-social-footer.js?v=20260628c"></script>
</body>
</html>
